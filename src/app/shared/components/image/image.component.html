<div class="stack-container-alt width-100 height-100">
  @for (image of images; track image.trackBy) {
    <img
      [src]="image.src"
      class="image-layer"
      [class.visible]="image.visible"
      [attr.data-image-track-by]="image.trackBy"
      [style.z-index]="image.zIndex"
      (transitionend)="onImageTransitionEnd(image, $event)"
      (transitioncancel)="onImageTransitionCancel(image, $event)" />
  }
</div>
